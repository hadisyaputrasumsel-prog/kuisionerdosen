version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kuisionerdosen-app
    ports:
      - "8085:80"
    environment:
      - APP_NAME=KuisionerDosen
      - APP_ENV=production
      - APP_KEY=base64:A5FkMaHnhh9AclMhBIaeCh3lcZwOIlKbxK6RG00VSjI=
      - APP_DEBUG=false
      - APP_URL=http://localhost:8085
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=kuisioner_dosen
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=kuisioner_dosen
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
